<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>蓝烨·喵喵喵 | 不许偷看</title>
    <link rel="stylesheet" href="https://s4.zstatic.net/ajax/libs/lxgw-wenkai-webfont/1.7.0/lxgwwenkai-regular.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-nest.js@2.0.4/dist/canvas-nest.js" color="251,191,36" opacity="0.6" count="80" zIndex="-1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'LXGW WenKai', sans-serif;
            min-height: 100vh;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            transition: background-image 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            z-index: 1;
            pointer-events: none;
            transition: backdrop-filter 0.3s, background 0.3s;
        }
        body.no-blur::before {
            backdrop-filter: blur(0px);
            background: rgba(0, 0, 0, 0.2);
        }
        #meteor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .main-content {
            position: relative;
            z-index: 15;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .front-lock {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(28px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s;
        }
        .lock-card {
            background: rgba(20, 30, 45, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 380px;
            text-align: center;
            border: 1px solid rgba(251, 191, 36, 0.7);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            animation: floatGlow 2.5s infinite alternate;
        }
        @keyframes floatGlow {
            0% { transform: translateY(0px); box-shadow: 0 20px 30px rgba(0,0,0,0.3);}
            100% { transform: translateY(-6px); box-shadow: 0 30px 45px rgba(251,191,36,0.2);}
        }
        .lock-card i { font-size: 3.5rem; color: #fbbf24; margin-bottom: 1rem; }
        .lock-card h2 { color: #fef3c7; margin-bottom: 1.5rem; font-weight: 600; }
        .lock-card input {
            width: 100%;
            padding: 0.85rem;
            border-radius: 2rem;
            border: none;
            background: rgba(255,255,245,0.95);
            margin-bottom: 1rem;
            text-align: center;
            outline: none;
            font-weight: 500;
        }
        .lock-card button {
            background: #fbbf24;
            border: none;
            padding: 0.75rem;
            width: 100%;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .error-tip { color: #f87171; margin-top: 0.8rem; font-size: 0.8rem; }
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2rem;
            background: rgba(255,255,245,0.2);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            border: 1px solid rgba(255,215,150,0.6);
        }
        .hero h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #FFF2D7, #FFD966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(20px);
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
            align-items: center;
        }
        .search-box {
            background: rgba(255,255,240,0.2);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            display: flex;
            align-items: center;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 0.5rem;
            color: white;
            outline: none;
            width: 210px;
        }
        .stats {
            background: rgba(0,0,0,0.55);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }
        .bg-btn-group {
            display: flex;
            gap: 0.7rem;
        }
        .bg-icon-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #fbbf24;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            color: #fbbf24;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .bg-icon-btn:hover {
            background: #fbbf24;
            color: #0f172a;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }
        .card {
            background: rgba(255,250,235,0.28);
            backdrop-filter: blur(14px);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(255,215,150,0.6);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            transform: translateY(0);
        }
        .card:hover {
            transform: translateY(-10px) scale(1.01);
            background: rgba(255,245,215,0.45);
            border-color: #fbbf24;
            box-shadow: 0 25px 35px -12px black;
        }
        .image-wrapper {
            aspect-ratio: 4/3;
            overflow: hidden;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover img {
            transform: scale(1.06);
        }
        .info {
            padding: 1rem;
        }
        .admin-entry {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
        }
        .admin-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #fbbf24;
            border-radius: 40px;
            padding: 0.7rem 1.4rem;
            color: #fbbf24;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 30, 0.96);
            backdrop-filter: blur(30px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        .admin-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .admin-panel-card {
            background: #0f172ae6;
            border-radius: 2rem;
            width: 90%;
            max-width: 1300px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #fbbf24;
            overflow: hidden;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: #0f172a;
            border-bottom: 1px solid #fbbf24;
        }
        .admin-body {
            display: flex;
            flex: 1;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow: hidden;
            flex-wrap: wrap;
        }
        .admin-form {
            flex: 1;
            background: #1e293b80;
            border-radius: 1.5rem;
            padding: 1.2rem;
        }
        .admin-list {
            flex: 2;
            background: #00000040;
            border-radius: 1.5rem;
            padding: 1rem;
            overflow-y: auto;
        }
        .image-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #1e293b;
            margin-bottom: 0.8rem;
            padding: 0.7rem;
            border-radius: 1rem;
        }
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(35px);
            z-index: 4000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #fbbf24;
            z-index: 5000;
            opacity: 0;
            transition: 0.2s;
        }
        footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.7; }
        @media (max-width: 760px) { .hero h1 { font-size: 1.8rem; } .controls { flex-direction: column; } }
        .star-cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #ffdd88, #fbbf24);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            filter: blur(1px);
            transition: transform 0.05s linear;
            box-shadow: 0 0 8px #ffcc44;
        }
        .music-float-ball {
            position: fixed;
            bottom: 100px;
            left: 24px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.4rem;
            transition: 0.2s;
        }
        .music-float-ball:hover { transform: scale(1.05); background: #fbbf24; color: #0f172a; }
    </style>
</head>
<body>
<canvas id="meteor-canvas"></canvas>

<div id="frontLock" class="front-lock">
    <div class="lock-card">
        <i class="fas fa-key"></i>
        <h2>蓝烨·私密相册</h2>
        <input type="password" id="frontPwd" placeholder="请输入访问密码" autocomplete="off">
        <button id="unlockFrontBtn">踏入流光世界</button>
        <div id="frontError" class="error-tip"></div>
        <div style="margin-top: 12px; font-size: 12px;">蓝烨数码科技工作室 · 典藏</div>
    </div>
</div>

<div id="frontMain" class="main-content" style="display: none;">
    <div class="hero">
        <h1><i class="fas fa-meteor"></i> 蓝烨·数码科技工作室 <i class="fas fa-star-of-life"></i></h1>
        <p> </p>
    </div>
    <div class="controls">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchFront" placeholder="检索标题或描述..."></div>
        <div class="stats"><i class="fas fa-images"></i> <span id="photoCount">0</span> 幅灵光</div>
        <div class="bg-btn-group">
            <button class="bg-icon-btn" id="refreshBgBtn"><i class="fas fa-sync-alt"></i> 随机背景</button>
            <button class="bg-icon-btn" id="toggleBlurBtn"><i class="fas fa-blur"></i> 关闭模糊</button>
        </div>
    </div>
    <div class="gallery" id="frontGallery"></div>
    <footer>✨ 悬浮流光·星辰跟随·流星永恒 | 蓝烨数码科技工作室</footer>
</div>

<div class="admin-entry"><button class="admin-btn" id="openAdminBtn"><i class="fas fa-crown"></i> 内容中枢</button></div>

<div id="adminOverlay" class="admin-overlay">
    <div class="admin-panel-card">
        <div class="admin-header"><h2><i class="fas fa-database"></i> 影像档案馆 · 后台管理</h2><button id="closeAdminBtn" style="background:#334155;">✕ 关闭</button></div>
        <div class="admin-body">
            <div class="admin-form">
                <h3>➕ 添加/编辑直链</h3>
                <input type="text" id="adminUrl" placeholder="图片URL *" style="width:100%; margin:0.5rem 0; padding:0.5rem;">
                <input type="text" id="adminTitle" placeholder="标题 *" style="width:100%; margin:0.5rem 0; padding:0.5rem;">
                <textarea id="adminDesc" rows="2" placeholder="描述" style="width:100%; margin:0.5rem 0;"></textarea>
                <button id="submitImageBtn" style="background:#fbbf24;"><i class="fas fa-save"></i> 保存图片</button>
                <button id="cancelEditBtn" style="display:none; margin-top:0.5rem;">取消编辑</button>
            </div>
            <div class="admin-list"><h3>📋 图库列表</h3><div id="adminImageListContainer"></div></div>
        </div>
    </div>
</div>

<div id="lightbox" class="lightbox"><div style="background:#000000aa; border-radius:2rem; padding:0.5rem;"><img id="lbImg" style="max-width:85vw; max-height:75vh; border-radius:1rem;"><div id="lbCaption" style="color:white; text-align:center; margin-top:0.5rem;"></div></div><div id="closeLightboxBtn" style="position:absolute; top:30px; right:40px; background:black; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">✕</div></div>
<div id="toastMsg" class="toast"></div>

<div class="star-cursor" id="starCursor"></div>
<div class="music-float-ball" id="musicFloatBtn"><i class="fas fa-music"></i></div>

<script>
    const FRONT_PASSWORD = "刷机认证蓝烨数码科技工作室";
    const BACKEND_PASSWORD = "203399LLJ";
    // 云存储 API 地址
    const CLOUD_API = "https://my-json-api.2070825130.workers.dev/api/images";
    
    let backendHashStored = "";
    let imagesData = [];
    let currentEditId = null;
    let frontUnlocked = false;
    let adminLoggedIn = false;
    let blurEnabled = true;
    let bgInterval = null;
    
    const frontLockDiv = document.getElementById('frontLock');
    const frontMainDiv = document.getElementById('frontMain');
    const unlockFrontBtn = document.getElementById('unlockFrontBtn');
    const frontPwdInput = document.getElementById('frontPwd');
    const frontErrorSpan = document.getElementById('frontError');
    const frontGalleryDiv = document.getElementById('frontGallery');
    const searchFront = document.getElementById('searchFront');
    const photoCountSpan = document.getElementById('photoCount');
    const refreshBgBtn = document.getElementById('refreshBgBtn');
    const toggleBlurBtn = document.getElementById('toggleBlurBtn');
    const openAdminBtn = document.getElementById('openAdminBtn');
    const adminOverlay = document.getElementById('adminOverlay');
    const closeAdminBtn = document.getElementById('closeAdminBtn');
    const submitImageBtn = document.getElementById('submitImageBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const adminUrl = document.getElementById('adminUrl');
    const adminTitle = document.getElementById('adminTitle');
    const adminDesc = document.getElementById('adminDesc');
    const adminImageListContainer = document.getElementById('adminImageListContainer');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCaption = document.getElementById('lbCaption');
    const closeLightboxBtn = document.getElementById('closeLightboxBtn');
    const toastDiv = document.getElementById('toastMsg');
    
    function showToast(msg, dur=1800) { toastDiv.innerText = msg; toastDiv.style.opacity = '1'; setTimeout(() => toastDiv.style.opacity = '0', dur); }
    
    // 本地备份
    function saveToLocalBackup() { localStorage.setItem('lanYe_imgData_cache', JSON.stringify(imagesData)); }
    function loadFromLocalBackup() {
        const cached = localStorage.getItem('lanYe_imgData_cache');
        if(cached) {
            imagesData = JSON.parse(cached);
            return true;
        }
        return false;
    }
    
    // 从云端加载图片数据
    async function loadImagesFromCloud() {
        try {
            const response = await fetch(CLOUD_API + '?t=' + Date.now());
            if (response.status === 404) {
                // 首次使用，初始化为空数组（不包含默认图片）
                imagesData = [];
                await saveImagesToCloud();
                showToast('云端存储已初始化', 1000);
            } else {
                const data = await response.json();
                imagesData = data || [];
            }
            saveToLocalBackup();
            return true;
        } catch (e) {
            console.error('云端加载失败', e);
            showToast('连接云端失败，使用本地缓存', 2000);
            return loadFromLocalBackup();
        }
    }
    
    // 保存图片数据到云端
    async function saveImagesToCloud() {
        try {
            const response = await fetch(CLOUD_API, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(imagesData)
            });
            if (!response.ok) throw new Error('保存失败');
            saveToLocalBackup();
            return true;
        } catch (e) {
            console.error('云端保存失败', e);
            showToast('云端保存失败，请稍后重试', 2000);
            return false;
        }
    }
    
    async function computeHash(str) {
        const enc = new TextEncoder();
        const data = enc.encode(str);
        const buf = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    async function initBackendHash() { backendHashStored = await computeHash(BACKEND_PASSWORD); }
    
    function setRandomBackground() {
        const url = `https://img.catcdn.cn/ba/?t=${Date.now()}`;
        const imgTest = new Image();
        imgTest.onload = () => { document.body.style.backgroundImage = `url(${url})`; };
        imgTest.onerror = () => { document.body.style.backgroundImage = "linear-gradient(145deg, #0b1a2e, #1e2f3f)"; };
        imgTest.src = url;
    }
    function startAutoBackground() {
        setRandomBackground();
        if(bgInterval) clearInterval(bgInterval);
        bgInterval = setInterval(() => setRandomBackground(), 25000);
    }
    function applyBlurSetting() {
        if(blurEnabled) document.body.classList.remove('no-blur');
        else document.body.classList.add('no-blur');
        toggleBlurBtn.innerHTML = blurEnabled ? '<i class="fas fa-blur"></i> 关闭模糊' : '<i class="fas fa-blur"></i> 开启模糊';
    }
    
    function renderFront() {
        if(!frontUnlocked) return;
        let keyword = searchFront.value.trim().toLowerCase();
        let filtered = imagesData.filter(item => item.title.toLowerCase().includes(keyword) || item.description.toLowerCase().includes(keyword));
        photoCountSpan.innerText = filtered.length;
        if(filtered.length === 0) { frontGalleryDiv.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">✨ 暂无影像，稍后添加</div>`; return; }
        frontGalleryDiv.innerHTML = filtered.map(img => `
            <div class="card" data-id="${img.id}">
                <div class="image-wrapper"><img loading="lazy" src="${img.url}" onerror="this.src='https://picsum.photos/id/104/400/300';"></div>
                <div class="info"><div style="font-weight:700;">📷 ${escapeHtml(img.title)}</div><div style="font-size:0.75rem;">${escapeHtml(img.description)}</div></div>
            </div>
        `).join('');
        document.querySelectorAll('#frontGallery .card').forEach(card => {
            const id = parseInt(card.dataset.id);
            card.addEventListener('click', () => { const img = imagesData.find(i=>i.id===id); if(img) openLightbox(img); });
        });
    }
    function openLightbox(img) { lbImg.src = img.url; lbCaption.innerText = `${img.title} · ${img.description}`; lightbox.style.visibility='visible'; lightbox.style.opacity='1'; }
    function closeLightboxFunc() { lightbox.style.visibility='hidden'; lightbox.style.opacity='0'; }
    
    function renderAdminList() {
        if(!adminLoggedIn) return;
        if(imagesData.length===0) { adminImageListContainer.innerHTML = '<div style="text-align:center;">暂无图片</div>'; return; }
        adminImageListContainer.innerHTML = imagesData.map(img => `
            <div class="image-item">
                <img src="${img.url}" style="width:60px;height:60px;object-fit:cover;border-radius:0.8rem;">
                <div style="flex:1"><strong>${escapeHtml(img.title)}</strong><br><small>${escapeHtml(img.description.substring(0,40))}</small></div>
                <div><button class="edit-item" data-id="${img.id}" style="background:#3b82f6;">编辑</button><button class="delete-item" data-id="${img.id}" style="background:#dc2626; margin-left:6px;">删除</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.edit-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const img = imagesData.find(i=>i.id===id);
                if(img) { adminUrl.value=img.url; adminTitle.value=img.title; adminDesc.value=img.description; currentEditId=id; submitImageBtn.innerHTML='✏️ 更新图片'; cancelEditBtn.style.display='block'; }
            });
        });
        document.querySelectorAll('.delete-item').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = parseInt(btn.dataset.id);
                if(confirm('永久删除？')) {
                    imagesData = imagesData.filter(i=>i.id!==id);
                    await saveImagesToCloud();
                    renderAdminList();
                    renderFront();
                    showToast('已删除',1000);
                }
            });
        });
    }
    async function handleSaveImage() {
        let url = adminUrl.value.trim(), title = adminTitle.value.trim(), desc = adminDesc.value.trim();
        if(!url || !title) { showToast('链接和标题不能为空',1200); return; }
        if(currentEditId) {
            const idx = imagesData.findIndex(i=>i.id===currentEditId);
            if(idx!==-1) { imagesData[idx] = {...imagesData[idx], url, title, description: desc}; }
        } else {
            imagesData.push({ id: Date.now(), url, title, description: desc });
        }
        const success = await saveImagesToCloud();
        if(success) {
            showToast(currentEditId ? '更新成功' : '添加成功', 1000);
            resetAdminForm();
            renderAdminList();
            renderFront();
        } else {
            // 保存失败时回滚界面
            renderAdminList();
            renderFront();
        }
    }
    function resetAdminForm() { adminUrl.value=''; adminTitle.value=''; adminDesc.value=''; currentEditId=null; submitImageBtn.innerHTML='<i class="fas fa-save"></i> 保存图片'; cancelEditBtn.style.display='none'; }
    
    async function showAdminLogin() {
        const pwd = prompt("🔐 管理员验证 | 请输入后台密码:");
        if(!pwd) return;
        const hash = await computeHash(pwd);
        if(hash === backendHashStored) { adminLoggedIn=true; renderAdminList(); adminOverlay.classList.add('active'); showToast('后台验证通过',1500); }
        else { alert('密码错误！无法进入内容中枢'); }
    }
    function closeAdminPanel() { adminOverlay.classList.remove('active'); adminLoggedIn=false; resetAdminForm(); }
    
    function unlockFront() {
        if(frontPwdInput.value === FRONT_PASSWORD) {
            frontUnlocked = true;
            frontLockDiv.style.display = 'none';
            frontMainDiv.style.display = 'block';
            renderFront();
            startAutoBackground();
            applyBlurSetting();
            showToast('欢迎进入流光世界 · 蓝烨工作室', 2000);
        } else { frontErrorSpan.innerText = '密钥错误，无法进入秘境'; frontPwdInput.value = ''; }
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    const canvas = document.getElementById('meteor-canvas');
    let ctx = canvas.getContext('2d');
    let width, height, meteors=[], starsBg=[];
    function resizeCanvas() { width=window.innerWidth; height=window.innerHeight; canvas.width=width; canvas.height=height; }
    function initStars() { for(let i=0;i<150;i++) starsBg.push({ x:Math.random()*width, y:Math.random()*height, r:Math.random()*2+1, alpha:Math.random()*0.5+0.2 }); }
    function createMeteor() { return { x:Math.random()*width, y:Math.random()*height*0.3, vx:(Math.random()*-3)-1.5, vy:Math.random()*2+1.2, len:Math.random()*60+40, life:1, decay:0.008+Math.random()*0.012 }; }
    for(let i=0;i<8;i++) meteors.push(createMeteor());
    function animateMeteor() {
        if(!ctx) return;
        ctx.clearRect(0,0,width,height);
        for(let s of starsBg) { ctx.beginPath(); ctx.fillStyle=`rgba(255,245,200,${s.alpha})`; ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }
        for(let m of meteors) {
            ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.lineTo(m.x+m.vx*m.len, m.y+m.vy*m.len);
            ctx.strokeStyle=`rgba(255,210,130,${m.life*0.8})`; ctx.lineWidth=2; ctx.stroke();
            m.x+=m.vx; m.y+=m.vy; m.life-=m.decay;
            if(m.x<-200 || m.y>height+150 || m.life<=0) {
                const idx=meteors.indexOf(m); meteors[idx]=createMeteor(); meteors[idx].life=0.95; meteors[idx].x=Math.random()*width; meteors[idx].y=-20;
            }
        }
        requestAnimationFrame(animateMeteor);
    }
    
    const starCursor = document.getElementById('starCursor');
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        starCursor.style.left = (mouseX - 4) + 'px';
        starCursor.style.top = (mouseY - 4) + 'px';
    });
    
    function initMusicPlayer() {
        const script1 = document.createElement('script');
        script1.src = "https://myhkw.cn/api/player/175346146383";
        script1.setAttribute('key', '175346146383');
        script1.setAttribute('m', '1');
        script1.id = "myhk";
        document.body.appendChild(script1);
        const script2 = document.createElement('script');
        script2.src = "https://myhkw.cn/player/js/jquery.min.js";
        document.body.appendChild(script2);
        const musicBtn = document.getElementById('musicFloatBtn');
        musicBtn.addEventListener('click', () => {
            const playerDiv = document.querySelector('.myhk-player');
            if(playerDiv) {
                if(playerDiv.style.display === 'none') playerDiv.style.display = 'block';
                else playerDiv.style.display = 'none';
            } else {
                showToast('音乐加载中，稍后点击右侧悬浮球~', 1500);
            }
        });
    }
    
    function loadSakura() {
        const sakuraScript = document.createElement('script');
        sakuraScript.src = "https://files.cnblogs.com/files/quaint/sakuraPlus.js";
        sakuraScript.async = true;
        document.body.appendChild(sakuraScript);
    }
    
    window.addEventListener('resize', ()=>{ resizeCanvas(); starsBg=[]; initStars(); });
    async function init() {
        await initBackendHash();
        // 从云端加载数据（必须成功加载配置）
        await loadImagesFromCloud();
        resizeCanvas(); initStars(); animateMeteor();
        initMusicPlayer();
        loadSakura();
        unlockFrontBtn.addEventListener('click', unlockFront);
        frontPwdInput.addEventListener('keypress', (e) => { if(e.key==='Enter') unlockFront(); });
        searchFront.addEventListener('input', () => renderFront());
        refreshBgBtn.addEventListener('click', () => { setRandomBackground(); showToast('背景已刷新',1000); });
        toggleBlurBtn.addEventListener('click', () => { blurEnabled = !blurEnabled; applyBlurSetting(); showToast(`背景模糊${blurEnabled?'已启用':'已关闭'}`,1000); });
        openAdminBtn.addEventListener('click', async () => { if(!adminLoggedIn) await showAdminLogin(); else { adminOverlay.classList.add('active'); renderAdminList(); } });
        closeAdminBtn.addEventListener('click', closeAdminPanel);
        submitImageBtn.addEventListener('click', handleSaveImage);
        cancelEditBtn.addEventListener('click', resetAdminForm);
        closeLightboxBtn.addEventListener('click', closeLightboxFunc);
        lightbox.addEventListener('click', (e) => { if(e.target===lightbox) closeLightboxFunc(); });
        frontLockDiv.style.display = 'flex';
        frontMainDiv.style.display = 'none';
    }
    init();
</script>
</body>
</html>
