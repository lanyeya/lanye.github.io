<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>蓝烨·私密相册</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lock-card {
            background: #1e293b;
            border-radius: 2rem;
            padding: 2.5rem;
            width: 380px;
            text-align: center;
            border: 1px solid #fbbf24;
        }
        .lock-card i { font-size: 3rem; color: #fbbf24; margin-bottom: 1rem; }
        .lock-card h2 { color: #fbbf24; margin-bottom: 1.5rem; }
        .lock-card input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            border: none;
            margin-bottom: 1rem;
            text-align: center;
        }
        .lock-card button {
            background: #fbbf24;
            border: none;
            padding: 0.75rem;
            width: 100%;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .error-tip { color: #f87171; margin-top: 0.8rem; font-size: 0.8rem; }
        
        .main-content { display: none; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 { color: #fbbf24; font-size: 1.8rem; }
        .note {
            background: rgba(0,0,0,0.5);
            border: 1px solid #fbbf24;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #fbbf24;
            font-size: 0.8rem;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(251,191,36,0.3);
        }
        .card:hover { transform: translateY(-5px); border-color: #fbbf24; }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card .info { padding: 1rem; color: white; }
        .card .title { font-weight: bold; margin-bottom: 0.25rem; }
        .card .desc { font-size: 0.8rem; opacity: 0.7; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fbbf24;
            color: #0f172a;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            z-index: 4000;
            opacity: 0;
            transition: 0.2s;
        }
        footer { text-align: center; margin-top: 2rem; color: #666; font-size: 0.8rem; }
        .empty-tip { text-align: center; padding: 3rem; color: #888; }
    </style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
    <div class="lock-card">
        <i class="fas fa-key"></i>
        <h2>蓝烨·私密相册</h2>
        <input type="password" id="pwdInput" placeholder="请输入访问密码">
        <button id="unlockBtn">踏入流光世界</button>
        <div id="errorTip" class="error-tip"></div>
    </div>
</div>

<div id="mainContent" class="container main-content">
    <div class="header">
        <h1><i class="fas fa-images"></i> 蓝烨数码科技工作室</h1>
        <div class="note"><i class="fas fa-info-circle"></i> 后台管理中，请联系管理员增删图片</div>
    </div>
    <div class="gallery" id="gallery"></div>
    <footer>✨ 悬浮流光 | 蓝烨工作室</footer>
</div>

<div id="toast" class="toast"></div>

<script>
    const FRONT_PASSWORD = "刷机认证蓝烨数码科技工作室";
    const DATA_URL = "https://raw.githubusercontent.com/lanyeya/lanye.github.io/main/data.json";
    
    let imagesData = [];
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }
    
    async function loadData() {
        try {
            const response = await fetch(DATA_URL + "?t=" + Date.now());
            if (response.ok) {
                imagesData = await response.json();
                renderGallery();
            } else {
                showToast('加载失败，请刷新重试');
            }
        } catch (e) {
            console.error('加载失败', e);
            showToast('加载失败，请检查网络');
        }
    }
    
    function renderGallery() {
        const gallery = document.getElementById('gallery');
        if (imagesData.length === 0) {
            gallery.innerHTML = '<div class="empty-tip">✨ 暂无图片，请联系管理员添加 ✨</div>';
            return;
        }
        
        gallery.innerHTML = imagesData.map(img => `
            <div class="card" onclick="openLightbox('${img.url}', '${img.title}', '${img.description}')">
                <img src="${img.url}" onerror="this.src='https://placehold.co/400x300?text=加载失败'">
                <div class="info">
                    <div class="title">📷 ${escapeHtml(img.title)}</div>
                    <div class="desc">${escapeHtml(img.description)}</div>
                </div>
            </div>
        `).join('');
    }
    
    function openLightbox(url, title, desc) {
        const win = window.open();
        win.document.write(`
            <html><head><title>${title}</title></head>
            <body style="background:black; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
                <img src="${url}" style="max-width:90vw; max-height:90vh; object-fit:contain;">
                <div style="position:fixed; bottom:20px; left:0; right:0; text-align:center; color:white;">${title} · ${desc}</div>
            </body>
            </html>
        `);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 初始化
    async function init() {
        await loadData();
        
        document.getElementById('unlockBtn').onclick = () => {
            const pwd = document.getElementById('pwdInput').value;
            if (pwd === FRONT_PASSWORD) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('errorTip').innerText = '密码错误';
            }
        };
        
        document.getElementById('pwdInput').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('unlockBtn').click();
        };
    }
    
    init();
</script>
</body>
</html>
